<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkyZero · Web</title>
  <link rel="preload" href="fonts/Inter-Regular.woff2"  as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Manrope-Bold.woff2"  as="font" type="font/woff2" crossorigin>
  <script>
    // Set theme before first paint to avoid flash. Tri-state: auto/light/dark.
    (function(){
      try {
        var saved = localStorage.getItem('skz_theme');
        var mode = (saved === 'light' || saved === 'dark') ? saved : 'auto';
        var resolved = (mode === 'auto')
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      } catch(e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.themeMode = 'auto';
      }
    })();
    // Set lang before first paint so static fallback content is in the right language.
    (function(){
      try {
        var lang = localStorage.getItem('skz_lang');
        if (lang !== 'zh' && lang !== 'en') lang = 'zh';
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      } catch(e) {
        document.documentElement.lang = 'zh-CN';
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <script defer src="/leaderboard.js?v=20260619b"></script>
  <style>
    /* Landing page fills the viewport so the hero + cards + footer fit on one
       screen without scrolling. Spacing uses vh-based clamps: tall monitors stay
       airy, short laptops compress to fit. (.app is global but this <style> only
       loads on the landing page, so the rule is effectively scoped here.) */
    .app {
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    .landing-main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: clamp(20px, 4.5vh, 56px);
      padding: clamp(16px, 4vh, 40px) 20px clamp(16px, 3.5vh, 48px);
      text-align: center;
    }
    .landing-hero {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .hero-brand {
      display: inline-flex; align-items: center; gap: 14px;
    }
    .hero-mark {
      width: 46px; height: 46px; flex: none;
      filter: drop-shadow(0 4px 12px rgba(27,31,36,0.12));
    }
    .hero-wordmark {
      font-size: clamp(34px, 7vw, 52px); line-height: 1;
    }
    .hero-eyebrow {
      margin: 0; font-size: 15px; font-weight: 500; color: var(--fg-muted);
      letter-spacing: 0.01em;
    }
    .landing-grid {
      display: grid; gap: 18px; width: 100%; max-width: 520px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (max-width: 560px) {
      .landing-grid { grid-template-columns: 1fr; max-width: 280px; }
    }
    .game-card {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(10px, 1.6vh, 14px);
      padding: clamp(18px, 3vh, 32px) 24px; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); color: var(--fg);
      transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
    }
    .game-card:hover {
      border-color: var(--border-strong); transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(27,31,36,0.10);
    }
    /* Pressed: settle back down so a tap reads as a click, not just a hover. */
    .game-card:active {
      border-color: var(--border-strong); transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(27,31,36,0.08);
    }
    @media (prefers-reduced-motion: reduce) {
      .game-card { transition: border-color .15s ease, box-shadow .15s ease; }
      .game-card:hover, .game-card:active { transform: none; }
    }
    .game-card .game-icon {
      width: clamp(64px, 9vh, 88px); height: clamp(64px, 9vh, 88px);
      display: grid; place-items: center;
    }
    .game-card .game-icon svg { width: 100%; height: 100%; }
    .game-card .game-name {
      font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
    }
    .game-card .game-desc {
      font-size: 13px; color: var(--fg-muted); line-height: 1.5;
    }
    /* Gomoku icon board */
    .ico-board { background: var(--board-bg); border-radius: 8px; padding: 10px; }
    .landing-footer {
      font-size: 11px; color: var(--fg-subtle);
      padding: 0 20px clamp(12px, 2.5vh, 28px);
      text-align: center;
    }
    /* Phone: lang/theme are the landing page's only header controls and they're
       hidden on phones (see style.css), so drop the whole now-empty bar and let
       the hero + cards sit at the top. */
    @media (max-width: 720px) {
      .topbar { display: none; }
    }
  </style>
</head>
<body>

            </svg>
          </button>
          <button class="seg-btn" data-theme="light" aria-pressed="false" aria-label="明亮" title="明亮">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="8" cy="8" r="3"></circle>
              <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"></path>
            </svg>
          </button>
          <button class="seg-btn" data-theme="dark" aria-pressed="false" aria-label="暗黑" title="暗黑">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M13.5 9.5A5.5 5.5 0 0 1 6.5 2.5a5.5 5.5 0 1 0 7 7z"></path>

      </div>
    </header>

                <line x1="56.6" y1="10" x2="56.6" y2="90"/><line x1="80" y1="10" x2="80" y2="90"/>
                <line x1="10" y1="10" x2="80" y2="10"/><line x1="10" y1="33.3" x2="80" y2="33.3"/>

              </g>

              <circle cx="56.6" cy="56.6" r="8" fill="#fff" stroke="#1a1a1a"/>

    </div>

    <footer class="landing-footer">
      <span id="footer_text">QQ群:620366051</span>
    </footer>
  </div>

  <script>
    // ---------- i18n (self-contained for the landing page) ----------
    var STRINGS = {
      zh: {
        title: 'SkyZero · Web',
        hero_title: '选择一个游戏',
        gomoku_name: '五子棋',
        gomoku_desc: '和 SkyZero 对弈',
        tree_name: '搜索树可视化',
        tree_desc: 'AlphaZero MCTS 逐步展开',
        g2048_name: '2048',
        g2048_desc: '经典数字合并益智游戏',
        dodge_name: '躲避',
        dodge_desc: '操控人物躲避四面弹幕',
        footer: 'QQ群:620366051',
        aria_lang: '切换语言', aria_theme: '切换配色主题',
        th_auto: '自动', th_light: '明亮', th_dark: '暗黑',
      },
      en: {
        title: 'SkyZero · Web',
        hero_title: 'Choose a game',
        gomoku_name: 'Gomoku',
        gomoku_desc: 'Play against SkyZero',
        tree_name: 'Search Tree',
        tree_desc: 'Watch AlphaZero MCTS expand',
        g2048_name: '2048',
        g2048_desc: 'The classic tile-merging puzzle',
        dodge_name: 'Dodge',
        dodge_desc: 'Steer a character through bullet hell',
        footer: 'QQ群:620366051',
        aria_lang: 'Switch language', aria_theme: 'Toggle theme',
        th_auto: 'Auto', th_light: 'Light', th_dark: 'Dark',
      },
    };
    function getLang() {
      try { var l = localStorage.getItem('skz_lang'); return (l === 'zh' || l === 'en') ? l : 'zh'; }
      catch (e) { return 'zh'; }
    }
    function applyLang(lang) {
      var s = STRINGS[lang] || STRINGS.zh;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = s.title;
      document.getElementById('hero_title').textContent = s.hero_title;
      document.getElementById('card_gomoku_name').textContent = s.gomoku_name;
      document.getElementById('card_gomoku_desc').textContent = s.gomoku_desc;
      document.getElementById('card_tree_name').textContent = s.tree_name;
      document.getElementById('card_tree_desc').textContent = s.tree_desc;
      document.getElementById('card_2048_name').textContent = s.g2048_name;
      document.getElementById('card_2048_desc').textContent = s.g2048_desc;
      document.getElementById('card_dodge_name').textContent = s.dodge_name;
      document.getElementById('card_dodge_desc').textContent = s.dodge_desc;
      document.getElementById('footer_text').textContent = s.footer;
      var langSeg = document.getElementById('lang_seg');
      langSeg.setAttribute('aria-label', s.aria_lang);
      langSeg.querySelectorAll('.seg-btn[data-lang]').forEach(function(b){
        b.setAttribute('aria-pressed', b.dataset.lang === lang ? 'true' : 'false');
      });
      var themeSeg = document.getElementById('theme_seg');
      themeSeg.setAttribute('aria-label', s.aria_theme);
      var titles = { auto: s.th_auto, light: s.th_light, dark: s.th_dark };
      themeSeg.querySelectorAll('.seg-btn[data-theme]').forEach(function(b){
        b.setAttribute('aria-label', titles[b.dataset.theme]);
        b.setAttribute('title', titles[b.dataset.theme]);
      });
    }

    // ---------- Theme ----------
    var THEME_MODES = ['auto', 'light', 'dark'];
    function resolveTheme(mode) {
      if (mode === 'light' || mode === 'dark') return mode;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(mode) {
      if (THEME_MODES.indexOf(mode) < 0) mode = 'auto';
      document.documentElement.dataset.theme = resolveTheme(mode);
      document.documentElement.dataset.themeMode = mode;
      document.querySelectorAll('#theme_seg .seg-btn[data-theme]').forEach(function(b){
        b.setAttribute('aria-pressed', b.dataset.theme === mode ? 'true' : 'false');
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      applyLang(getLang());
      applyTheme(document.documentElement.dataset.themeMode || 'auto');

      document.querySelectorAll('#lang_seg .seg-btn[data-lang]').forEach(function (b) {
        b.addEventListener('click', function () {
          var lang = b.dataset.lang;
          try { localStorage.setItem('skz_lang', lang); } catch (e) {}
          applyLang(lang);
        });
      });
      document.querySelectorAll('#theme_seg .seg-btn[data-theme]').forEach(function (b) {
        b.addEventListener('click', function () {
          var next = b.dataset.theme;
          if (THEME_MODES.indexOf(next) < 0) return;
          try {
            if (next === 'auto') localStorage.removeItem('skz_theme');
            else localStorage.setItem('skz_theme', next);
          } catch (e) {}
          applyTheme(next);
        });
      });

      try {
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        var onSys = function () {
          if ((document.documentElement.dataset.themeMode || 'auto') !== 'auto') return;
          applyTheme('auto');
        };
        if (mql.addEventListener) mql.addEventListener('change', onSys);
        else if (mql.addListener) mql.addListener(onSys);
      } catch (e) {}
    });
  </script>
</body>
</html>
