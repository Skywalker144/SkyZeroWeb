<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkyZero · Gomoku</title>
  <link rel="preload" href="fonts/Inter-Regular.woff2"  as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Jost-SemiBold.woff2"  as="font" type="font/woff2" crossorigin>
  <script>
    // Set theme before first paint to avoid flash. Tri-state: auto/light/dark.
    (function(){
      try {
        var saved = localStorage.getItem('skz_theme');
        var mode = (saved === 'light' || saved === 'dark') ? saved : 'auto';
        var resolved = (mode === 'auto')
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      } catch(e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.themeMode = 'auto';
      }
    })();
    // Set lang before first paint so static fallback content is in the right language.
    (function(){
      try {
        var lang = localStorage.getItem('skz_lang');
        if (lang !== 'zh' && lang !== 'en') lang = 'zh';
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      } catch(e) {
        document.documentElement.lang = 'zh-CN';
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    // Apply the play/analysis mode class before first paint so the analysis-only
    // surfaces (free-board placement, sims-count label) don't flash on load.
    (function(){
      try {
        if (localStorage.getItem('skz_mode') === 'analysis')
          document.body.classList.add('mode-analysis');
      } catch(e) {}
    })();
  </script>

  <div class="app">
    <!-- Top toolbar: brand · status · mode/side segments · actions · settings · lang/theme -->
    <header class="topbar">
      <a class="brand-title" href="/" data-i18n-title="back_home" title="返回首页"><span class="brand-wm"><span class="bw-sky">Sky</span><span class="bw-zero">Zero</span></span><span class="brand-suffix"> · Gomoku</span></a>

      <div class="status-pill" id="status_pill" data-variant="idle">
        <span class="dot"></span>
        <span id="status" data-i18n="status_idle">空闲</span>
      </div>

      <div class="tb-sep"></div>

      <div class="tb-group">
        <span class="tb-label" data-i18n="tb_label_mode">模式</span>
        <div class="seg-row" id="mode_seg" role="group" data-i18n-aria="tb_label_mode" aria-label="模式">
          <button class="seg-btn" id="mode_play" aria-pressed="true" data-i18n="mode_play">对弈</button>
          <button class="seg-btn" id="mode_analysis" aria-pressed="false" data-i18n="mode_analysis">分析</button>
        </div>
      </div>

      <div class="tb-group" id="side_row">
        <span class="tb-label" data-i18n="tb_label_side">执子</span>
        <div class="seg-row">
          <button class="seg-btn" id="side_black" aria-pressed="true">
            <span class="seg-stone black"></span><span data-i18n="side_black">黑棋</span>
          </button>
          <button class="seg-btn" id="side_white" aria-pressed="false">
            <span class="seg-stone white"></span><span data-i18n="side_white">白棋</span>
          </button>
        </div>
      </div>

      <div class="tb-group" id="model_wrap">
        <span class="tb-label" data-i18n="label_model">模型</span>
        <select id="model_select" class="tb-select"></select>
      </div>

      <div class="tb-group" id="think_time_wrap">
        <span class="tb-label" data-i18n="tb_label_think">思考时间</span>
        <select id="think_time_select" class="num tb-select" data-i18n-aria="aria_think_time" aria-label="思考时间">
          <option value="500">0.5s</option>
          <option value="1000">1s</option>
          <option value="2000">2s</option>
          <option value="3000" selected>3s</option>
          <option value="5000">5s</option>
          <option value="10000">10s</option>
        </select>
      </div>

      <div class="tb-actions">
        <button class="btn primary" id="new_btn" data-i18n="btn_new_game">新对局</button>
        <button class="btn danger-ghost" id="undo_btn" data-i18n="btn_undo">悔棋</button>
      </div>

      <div class="topbar-right">
        <div class="settings-wrap">
          <button class="btn" id="settings_btn" aria-expanded="false" aria-controls="settings_pop" data-i18n="btn_settings">设置</button>
          <div class="settings-pop hidden" id="settings_pop">
            <div class="set-row">
              <span class="tb-label" data-i18n="label_rule">规则</span>
              <div class="seg-row">
                <button class="seg-btn" id="rule_freestyle" data-rule="freestyle" aria-pressed="true"  data-i18n="rule_freestyle">无禁手</button>
                <button class="seg-btn" id="rule_renju"     data-rule="renju"     aria-pressed="false" data-i18n="rule_renju">连珠</button>
              </div>
            </div>
            <div class="set-row">
              <span class="tb-label" data-i18n="label_board_size">棋盘大小</span>
              <div class="size-control">
                <input type="range" id="size_input" min="9" max="19" step="1" value="15" data-i18n-aria="label_board_size" aria-label="棋盘大小">
                <span class="size-value" id="size_value">15</span>
              </div>
            </div>
            <div class="set-row">
              <span class="tb-label" data-i18n="label_cand_palette">候选配色</span>
              <div class="seg-row palette-row" id="palette_seg" role="group" data-i18n-aria-group="aria_cand_palette" aria-label="候选点位配色">
                <button class="swatch-btn" type="button" data-palette="violet" aria-pressed="true"  data-i18n-title="palette_violet" data-i18n-aria="palette_violet" title="紫罗兰" aria-label="紫罗兰"></button>
                <button class="swatch-btn" type="button" data-palette="amber"  aria-pressed="false" data-i18n-title="palette_amber"  data-i18n-aria="palette_amber"  title="琥珀"   aria-label="琥珀"></button>
                <button class="swatch-btn" type="button" data-palette="blue"   aria-pressed="false" data-i18n-title="palette_blue"   data-i18n-aria="palette_blue"   title="蓝青"   aria-label="蓝青"></button>
                <button class="swatch-btn" type="button" data-palette="teal"   aria-pressed="false" data-i18n-title="palette_teal"   data-i18n-aria="palette_teal"   title="翠绿"   aria-label="翠绿"></button>
                <button class="swatch-btn" type="button" data-palette="rose"   aria-pressed="false" data-i18n-title="palette_rose"   data-i18n-aria="palette_rose"   title="玫瑰"   aria-label="玫瑰"></button>
              </div>
            </div>
            <div class="set-row">
              <button class="btn btn--full" id="edit_btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11.5 1.5l3 3-9 9H2.5v-3z"/></svg>
                <span data-i18n="btn_edit_position">编辑棋形</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="main">
      <!-- Left column: win-rate stacked-area chart (top) + per-game stats (bottom) -->
      <aside class="winrate-col" id="winrate_col">
        <div class="card chart-card">
          <div class="card-body">
            <div class="seg-row vc-tabs">
              <button class="seg-btn" id="vc_tab_root" aria-pressed="true"  onclick="setValueTab('root')" data-i18n="legend_root">根</button>
              <button class="seg-btn" id="vc_tab_nn"   aria-pressed="false" onclick="setValueTab('nn')"   data-i18n="legend_nn">网络</button>
            </div>
            <div class="vc-legend">
              <span><span class="sw blk"></span><span data-i18n="legend_black_win">黑胜</span> <b id="vc_w_black">—</b></span>
              <span><span class="sw drw"></span><span data-i18n="legend_draw">平局</span> <b id="vc_w_draw">—</b></span>
              <span><span class="sw wht"></span><span data-i18n="legend_white_win">白胜</span> <b id="vc_w_white">—</b></span>
            </div>
            <canvas id="value_chart"></canvas>
          </div>
        </div>
        <!-- Per-game stats, derived from the win-rate history + move clock.
             每手失分 (skill) is a rolling cross-game mean of per-move win% loss
             kept in localStorage; worst-move and avg-time are this game, play
             mode only. -->
        <div class="card stats-card">
          <div class="card-body stats-body">
            <div class="stats-head">
              <span data-i18n="stats_title">本局统计</span>
              <span class="stats-persp" id="stats_persp"></span>
            </div>
            <div class="stats-grid">
              <div class="stat"><span class="stat-k" data-i18n="stat_skill">每手失分</span><span class="stat-v" id="gs_skill">—</span></div>
              <div class="stat"><span class="stat-k" data-i18n="stat_moves">总手数</span><span class="stat-v" id="gs_moves">0</span></div>
              <div class="stat"><span class="stat-k" data-i18n="stat_blunder">最大失误</span><span class="stat-v" id="gs_blunder">—</span></div>
              <div class="stat"><span class="stat-k" data-i18n="stat_avgtime">平均每手用时</span><span class="stat-v" id="gs_avgtime">—</span></div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Center column: board -->
      <section class="board-col">
        <div class="card board-card">
          <canvas id="board"></canvas>
          <!-- Loading overlay: floats over the board with a masked backdrop
               while the first ONNX model downloads -->
          <div id="loading_overlay">
            <div class="loader-card">
              <div class="loader-spin"></div>
              <div class="loader-text" id="loading_text">正在加载模型…</div>
              <div class="loader-bar"><div class="loader-fill" id="loading_fill"></div></div>
              <div class="loader-pct" id="loading_pct">0%</div>
            </div>
          </div>
        </div>
        <div class="board-actions edit-toolbar" id="edit_toolbar">
          <div class="seg-row edit-tools" id="edit_tool_seg" role="group" data-i18n-aria="aria_edit_tool" aria-label="编辑工具">
            <button class="seg-btn" data-edit-tool="alternate" aria-pressed="true">
              <span class="seg-stone alt"></span><span data-i18n="edit_tool_alternate">轮流</span>
            </button>
            <button class="seg-btn" data-edit-tool="black" aria-pressed="false">
              <span class="seg-stone black"></span><span data-i18n="edit_tool_black">放黑</span>
            </button>
            <button class="seg-btn" data-edit-tool="white" aria-pressed="false">
              <span class="seg-stone white"></span><span data-i18n="edit_tool_white">放白</span>
            </button>
            <button class="seg-btn" data-edit-tool="erase" aria-pressed="false">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 12.5l9-9 1 1-9 9zM2 14h12"/></svg>
              <span data-i18n="edit_tool_erase">擦除</span>
            </button>
          </div>
          <button class="btn" id="edit_undo_btn" data-i18n="btn_edit_undo" disabled>撤回</button>
          <button class="btn primary" id="edit_done_btn" data-i18n="btn_edit_done">完成</button>
          <button class="btn" id="edit_cancel_btn" data-i18n="btn_cancel">取消</button>
        </div>
      </section>

      <!-- Right column: candidate move list + collapsible heatmap drawer -->
      <aside class="analysis-col" id="right_col">
        <div class="card cand-card">
          <div class="card-body cand-body">
            <div class="card-title cand-head">
              <span data-i18n="cand_title">候选着法</span>
              <label class="toggle cand-toggle" title="在棋盘上显示我方回合的分析(AI 回合始终显示)" data-i18n-title="show_on_board_aria" data-i18n-aria="show_on_board_aria" aria-label="在棋盘上显示我方回合的分析(AI 回合始终显示)">
                <span class="cand-toggle-label" data-i18n="show_on_board">棋盘显示</span>
                <input type="checkbox" id="show_analysis_input">
                <span class="track"></span>
              </label>
              <span class="cand-head-right">
                <span class="cand-legend" data-i18n="cand_legend">胜率 · 访问</span>
                <button class="cand-tree-btn" id="tree_analyze_btn" type="button" data-i18n-title="tree_analyze" data-i18n-aria="tree_analyze" title="搜索树分析当前局面" aria-label="搜索树分析当前局面">
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="8" cy="3" r="1.7"/><circle cx="3.5" cy="13" r="1.7"/><circle cx="12.5" cy="13" r="1.7"/><path d="M8 4.7L3.5 11.3M8 4.7l4.5 6.6"/>
                  </svg>
                </button>
              </span>
            </div>
            <div class="cand-list" id="cand_list">
              <div class="cand-empty" data-i18n="cand_empty">暂无分析</div>
            </div>
          </div>
        </div>

        <div class="card drawer" id="heat_drawer" data-more="collapsed">
          <button class="drawer-toggle" id="heat_drawer_btn" aria-expanded="true" aria-controls="heat_drawer_body">
            <svg class="chev" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg>
            <span data-i18n="heat_drawer_title">NN 热力图</span>
            <span class="drawer-count">5</span>
          </button>
          <div class="drawer-body" id="heat_drawer_body">
            <div class="grids" id="heat_grids">
              <div class="card grid-card">
                <div class="grid-title"><span class="grid-title-text" data-i18n="heat_nn_policy">网络策略</span>
                  <span class="grid-title-actions">
                    <button class="pin-btn" data-target="h_nn_policy" data-i18n-aria="aria_pin_heat" aria-label="固定到棋盘" aria-pressed="false"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="3"/><line x1="8" y1="9" x2="8" y2="13.5"/></svg></button>
                    <button class="expand-btn" data-target="h_nn_policy" data-i18n-aria="aria_expand" aria-label="展开"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6V2.5h3.5M13.5 6V2.5H10M2.5 10v3.5h3.5M13.5 10v3.5H10"/></svg></button>
                  </span>
                </div>
                <canvas class="heat" id="h_nn_policy"></canvas>
              </div>
              <div class="card grid-card">
                <div class="grid-title"><span class="grid-title-text" data-i18n="heat_visits_dist">访问分布</span>
                  <span class="grid-title-actions">
                    <button class="pin-btn" data-target="h_mcts_visits" data-i18n-aria="aria_pin_heat" aria-label="固定到棋盘" aria-pressed="false"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="3"/><line x1="8" y1="9" x2="8" y2="13.5"/></svg></button>
                    <button class="expand-btn" data-target="h_mcts_visits" data-i18n-aria="aria_expand" aria-label="展开"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6V2.5h3.5M13.5 6V2.5H10M2.5 10v3.5h3.5M13.5 10v3.5H10"/></svg></button>
                  </span>
                </div>
                <canvas class="heat" id="h_mcts_visits"></canvas>
              </div>
              <div class="card grid-card">
                <div class="grid-title"><span class="grid-title-text" data-i18n="heat_nn_opp_policy">对手策略</span>
                  <span class="grid-title-actions">
                    <button class="pin-btn" data-target="h_nn_opp_policy" data-i18n-aria="aria_pin_heat" aria-label="固定到棋盘" aria-pressed="false"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="3"/><line x1="8" y1="9" x2="8" y2="13.5"/></svg></button>
                    <button class="expand-btn" data-target="h_nn_opp_policy" data-i18n-aria="aria_expand" aria-label="展开"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6V2.5h3.5M13.5 6V2.5H10M2.5 10v3.5h3.5M13.5 10v3.5H10"/></svg></button>
                  </span>
                </div>
                <canvas class="heat" id="h_nn_opp_policy"></canvas>
              </div>
              <div class="card grid-card">
                <div class="grid-title"><span class="grid-title-text" data-i18n="heat_nn_futurepos_8">未来落点 +8</span>
                  <span class="grid-title-actions">
                    <button class="pin-btn" data-target="h_nn_futurepos_8" data-i18n-aria="aria_pin_heat" aria-label="固定到棋盘" aria-pressed="false"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="3"/><line x1="8" y1="9" x2="8" y2="13.5"/></svg></button>
                    <button class="expand-btn" data-target="h_nn_futurepos_8" data-i18n-aria="aria_expand" aria-label="展开"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6V2.5h3.5M13.5 6V2.5H10M2.5 10v3.5h3.5M13.5 10v3.5H10"/></svg></button>
                  </span>
                </div>
                <canvas class="heat" id="h_nn_futurepos_8"></canvas>
              </div>
              <div class="card grid-card">
                <div class="grid-title"><span class="grid-title-text" data-i18n="heat_nn_futurepos_32">未来落点 +32</span>
                  <span class="grid-title-actions">
                    <button class="pin-btn" data-target="h_nn_futurepos_32" data-i18n-aria="aria_pin_heat" aria-label="固定到棋盘" aria-pressed="false"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="6" r="3"/><line x1="8" y1="9" x2="8" y2="13.5"/></svg></button>
                    <button class="expand-btn" data-target="h_nn_futurepos_32" data-i18n-aria="aria_expand" aria-label="展开"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6V2.5h3.5M13.5 6V2.5H10M2.5 10v3.5h3.5M13.5 10v3.5H10"/></svg></button>
                  </span>
                </div>
                <canvas class="heat" id="h_nn_futurepos_32"></canvas>
              </div>
            </div>
            <button class="heat-more-toggle" id="heat_more_btn" aria-expanded="false" aria-controls="heat_grids">
              <span class="more-show" data-i18n="heat_show_all">展开全部</span>
              <span class="heat-more-count">+3</span>
              <span class="more-hide" data-i18n="heat_collapse">收起</span>
              <svg class="chev" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3l5 5-5 5"/></svg>
            </button>
          </div>
        </div>
      </aside>
    </div>

    <!-- Mobile-only bottom bar: the Settings control is relocated here on ≤720px
         (by initSettingsPlacement in main.js) so the top toolbar stays tidy -->
    <div class="mobile-actionbar" id="mobile_actionbar"></div>

    <!-- Board-size confirm modal -->
    <div class="confirm-modal hidden" id="size_confirm_modal" role="dialog" aria-modal="true" aria-labelledby="size_confirm_title">
      <div class="confirm-modal-card">
        <div class="confirm-modal-title" id="size_confirm_title" data-i18n="size_confirm_title">切换棋盘大小?</div>
        <div class="confirm-modal-body" id="size_confirm_body"></div>
        <div class="confirm-modal-actions">
          <button class="btn" id="size_confirm_cancel" data-i18n="btn_cancel">取消</button>
          <button class="btn primary" id="size_confirm_ok" data-i18n="btn_confirm_reset">重置</button>
        </div>
      </div>
    </div>

    <!-- Heat modal (fullscreen single heatmap) -->
    <div class="heat-modal hidden" id="heat_modal" role="dialog" aria-modal="true">
      <div class="heat-modal-card">
        <div class="heat-modal-header">
          <span class="heat-modal-title" id="heat_modal_title">热力图</span>
          <button class="heat-modal-close" id="heat_modal_close" data-i18n-aria="aria_close" aria-label="关闭">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
          </button>
        </div>
        <canvas id="heat_modal_canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="gomoku.js"></script>
  <script src="mcts.js"></script>
  <script src="main.js"></script>
</body>
</html>
