<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>2048 · SkyZero</title>
  <link rel="preload" href="fonts/Inter-Regular.woff2"  as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    // Reuse the same theme/lang prefs as the Gomoku page so style stays
    // consistent across the two games.
    (function(){
      try {
        var saved = localStorage.getItem('skz_theme');
        var mode = (saved === 'light' || saved === 'dark') ? saved : 'auto';
        var resolved = (mode === 'auto')
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      } catch(e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.themeMode = 'auto';
      }
    })();
    (function(){
      try {
        var lang = localStorage.getItem('skz_lang');
        if (lang !== 'zh' && lang !== 'en') lang = 'zh';
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      } catch(e) {
        document.documentElement.lang = 'zh-CN';
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <!-- Pin the leaderboard to 2048 so the dodge board doesn't show here. -->
  <script>window.SKZ_LB_GAME = '2048';</script>
  <script defer src="/leaderboard.js"></script>
  <style>
    /* 2048-specific styles. Theme colors come from style.css variables so
       light/dark mode follow the gomoku page automatically. */
    .g2048-app {
      max-width: 520px; margin: 0 auto; padding: 8px 16px 24px;
      display: flex; flex-direction: column; gap: 14px;
      /* Allow vertical scroll so the inline leaderboard below the board stays
         reachable on phones; only the board itself opts out of scroll (below)
         so swipes drive moves instead of panning the page. */
      touch-action: pan-y;
    }
    .g2048-scores {
      display: flex; gap: 10px; justify-content: center;
    }
    .g2048-score {
      flex: 1; min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      text-align: center;
    }
    .g2048-score-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--fg-muted);
    }
    .g2048-score-value {
      font-family: var(--font-mono);
      font-size: 22px; font-weight: 700; color: var(--fg);
      line-height: 1.1; margin-top: 2px;
    }
    .g2048-actions {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .btn:disabled { opacity: 0.5; cursor: default; pointer-events: none; }
    /* AI auto-play toggle: lit when engaged. */
    #ai_auto_btn[aria-pressed="true"] {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .g2048-ai-status {
      min-height: 18px; text-align: center; font-size: 12.5px;
      font-family: var(--font-mono); color: var(--fg-muted);
    }
    /* AI speed/strength slider: left = faster (fewer MCTS sims), right =
       stronger (more sims). Minimal style — a thin neutral rail (no fill) with
       a solid accent knob riding on top, distinct from the rail by color. */
    .g2048-ai-speed {
      display: flex; align-items: center; gap: 12px;
      max-width: 360px; margin: 2px auto 0; width: 100%;
    }
    .g2048-speed-end {
      font-size: 12px; font-weight: 600; color: var(--fg-muted);
      white-space: nowrap; user-select: none; -webkit-user-select: none;
    }
    #ai_speed {
      -webkit-appearance: none; appearance: none;
      flex: 1; min-width: 0; height: 20px; margin: 0;
      background: transparent; cursor: pointer;
    }
    /* WebKit/Blink: a clearly-visible gray rail (--border, edged with
       --border-strong so it stands off the page bg) + accent knob on top. */
    #ai_speed::-webkit-slider-runnable-track {
      height: 8px; border-radius: 999px;
      background: var(--border); box-shadow: inset 0 0 0 1px var(--border-strong);
    }
    #ai_speed::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; margin-top: -5px;   /* (8-18)/2 — ride on rail */
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    #ai_speed:hover::-webkit-slider-thumb { box-shadow: 0 1px 5px rgba(0,0,0,.38); }
    #ai_speed:active::-webkit-slider-thumb { transform: scale(1.15); }
    /* Firefox: keep ::-moz-range-progress the same gray as the track so there
       is no left-side fill; accent knob. */
    #ai_speed::-moz-range-track {
      height: 8px; border-radius: 999px;
      background: var(--border); box-shadow: inset 0 0 0 1px var(--border-strong);
    }
    #ai_speed::-moz-range-progress {
      height: 8px; border-radius: 999px; background: var(--border);
    }
    #ai_speed::-moz-range-thumb {
      width: 18px; height: 18px; border: none; border-radius: 50%;
      background: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    #ai_speed:focus { outline: none; }
    #ai_speed:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
    }
    #ai_speed:focus-visible::-moz-range-thumb {
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .g2048-board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      /* Reuse the gomoku wood color so the two pages feel like the same app.
         Tracks the theme through the shared CSS variable. */
      background: var(--board-bg);
      border: 1px solid var(--border);
      /* Concentric corners with the inner cells: outer radius = cell radius
         + distance from cell to board outer edge. Distance is 1px border +
         10px grid inset (.g2048-grid is absolute with inset:10px from the
         padding-box). Equal radial gap on every point of the curve. */
      --board-radius: calc(var(--radius-md) + 11px);
      border-radius: var(--board-radius);
      padding: 10px;
      box-sizing: border-box;
      box-shadow: var(--shadow-xs);
      user-select: none;
      -webkit-user-select: none;
      /* Swipes on the board drive moves, not page scroll. */
      touch-action: none;
    }
    /* The board is focusable (tabindex=0) so keyboard arrows work, but the
       default focus ring shows up as a blue box around it — suppress it. */
    .g2048-board:focus,
    .g2048-board:focus-visible {
      outline: none;
    }
    .g2048-grid {
      position: absolute; inset: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }
    .g2048-cell {
      background: color-mix(in srgb, var(--fg-subtle) 18%, transparent);
      border-radius: var(--radius-md);
    }
    .g2048-tiles {
      position: absolute; inset: 10px;
      pointer-events: none;
    }
    /* Two-element tile: outer owns translate + slide transition; inner owns
       scale + pop/merge keyframes. Splitting them means the merge/appear
       animations never touch translate, so a fast slide that's interrupted
       by another slide blends smoothly instead of snapping to its final
       position via an overriding keyframe. */
    .g2048-tile {
      position: absolute;
      /* `--slide-ms` is set by JS per-move on `#tiles` and inherits down. The
         default keeps things sane if JS hasn't set it yet. */
      transition: transform var(--slide-ms, 120ms) cubic-bezier(0.22, 0.5, 0.28, 1);
      will-change: transform;
    }
    .g2048-tile-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans);
      font-weight: 700;
      border-radius: var(--radius-md);
      will-change: transform;
    }
    .g2048-tile.appear .g2048-tile-inner { animation: g2048-pop 150ms ease-out; }
    .g2048-tile.merged .g2048-tile-inner { animation: g2048-merge 160ms ease-out; }
    .g2048-tile.merged { z-index: 2; }
    @keyframes g2048-pop {
      from { transform: scale(0); }
      60%  { transform: scale(1.10); }
      to   { transform: scale(1); }
    }
    @keyframes g2048-merge {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.20); }
    }
    /* Tile palette — classic 2048 colors, tuned to look OK in dark mode too. */
    .g2048-tile-inner[data-v="2"]    { background:#eee4da; color:#776e65; }
    .g2048-tile-inner[data-v="4"]    { background:#ede0c8; color:#776e65; }
    .g2048-tile-inner[data-v="8"]    { background:#f2b179; color:#f9f6f2; }
    .g2048-tile-inner[data-v="16"]   { background:#f59563; color:#f9f6f2; }
    .g2048-tile-inner[data-v="32"]   { background:#f67c5f; color:#f9f6f2; }
    .g2048-tile-inner[data-v="64"]   { background:#f65e3b; color:#f9f6f2; }
    .g2048-tile-inner[data-v="128"]  { background:#edcf72; color:#f9f6f2; }
    .g2048-tile-inner[data-v="256"]  { background:#edcc61; color:#f9f6f2; }
    .g2048-tile-inner[data-v="512"]  { background:#edc850; color:#f9f6f2; }
    .g2048-tile-inner[data-v="1024"] { background:#edc53f; color:#f9f6f2; }
    .g2048-tile-inner[data-v="2048"] { background:#edc22e; color:#f9f6f2; }
    .g2048-tile-inner[data-v-big]    { background:#3c3a32; color:#f9f6f2; }
    .g2048-overlay {
      position: absolute;
      /* `inset: 0` would size the overlay to the board's padding-box (inside
         the 1px border) — then matching the corner curve means subtracting
         border-width, which never lines up perfectly under sub-pixel rendering
         or after theme tweaks. Instead extend the overlay 1px past every edge
         so it covers the border too, and use the same `--radius-lg` as the
         board's OUTER corner. Now the curves coincide by construction. */
      inset: -1px;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      backdrop-filter: blur(2px);
      /* Inherits --board-radius from .g2048-board so they always match. */
      border-radius: var(--board-radius);
      z-index: 3;
    }
    .g2048-overlay.show { display: flex; }
    .g2048-overlay-title {
      font-size: 28px; font-weight: 700; color: var(--fg);
    }

  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <a class="brand-title" href="/" style="text-decoration:none;color:inherit;"
           title="返回首页" id="brand_link">← SkyZero · 2048</a>
      </div>
      <div class="topbar-actions">
        <div class="seg-row compact" id="lang_seg" role="group" aria-label="Switch language">
          <button class="seg-btn" data-lang="zh" aria-pressed="true">中</button>
          <button class="seg-btn" data-lang="en" aria-pressed="false">EN</button>
        </div>
        <div class="seg-row compact" id="theme_seg" role="group" aria-label="Toggle theme">
          <button class="seg-btn" data-theme="auto" aria-pressed="true" aria-label="Auto" title="Auto">

            </svg>

          <button class="seg-btn" data-theme="light" aria-pressed="false" aria-label="Light" title="Light">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

              <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"></path>
            </svg>

    <div class="g2048-app">
      <div class="g2048-scores">
        <div class="g2048-score">
          <div class="g2048-score-label" id="lbl_score">分数</div>
          <div class="g2048-score-value" id="score">0</div>
        </div>
        <div class="g2048-score">
          <div class="g2048-score-label" id="lbl_best">最高分</div>
          <div class="g2048-score-value" id="best">0</div>
        </div>
      </div>
      <div class="g2048-actions">
        <button class="btn primary" id="new_btn">新对局</button>
        <button class="btn danger-ghost" id="undo_btn">撤销</button>
        <button class="btn" id="ai_move_btn" disabled>AI 走子</button>
        <button class="btn" id="ai_auto_btn" aria-pressed="false" disabled>AI 托管</button>
      </div>
      <div class="g2048-ai-speed">
        <span class="g2048-speed-end" id="ai_speed_fast">更快</span>
        <input type="range" id="ai_speed" min="48" max="256" step="1" value="64"
               aria-label="AI 速度 / 强度">
        <span class="g2048-speed-end" id="ai_speed_strong">更强</span>
      </div>
      <div class="g2048-ai-status" id="ai_status"></div>
      <div class="g2048-board" id="g2048_board" tabindex="0" aria-label="2048 board">
        <div class="g2048-grid" id="grid"></div>
        <div class="g2048-tiles" id="tiles"></div>
        <div class="g2048-overlay" id="overlay">
          <div class="g2048-overlay-title" id="overlay_title">游戏结束</div>
          <button class="btn primary" id="overlay_btn">再来一局</button>
        </div>
      </div>
      <!-- Mobile leaderboard mount: leaderboard.js fills this in below the
           board on narrow screens (desktop uses the left dock instead). -->
      <div class="skz-lb-inline" id="skz-lb-inline"></div>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    // ---------- i18n (tiny, just for this page) ----------
    const STR = {
      zh: {
        score: '分数', best: '最高分',
        new_game: '新对局', undo: '撤销',
        game_over: '游戏结束', you_win: '到达 2048!',
        play_again: '再来一局', keep_going: '继续',
        brand: '← SkyZero · 2048',
        ai_move: 'AI 走子', ai_auto: 'AI 托管', ai_stop: '停止',
        ai_loading: '加载 AI 模型…', ai_thinking: '思考中…',
        ai_ready: 'AI 就绪', ai_error: 'AI 加载失败',
        ai_fast: '更快', ai_strong: '更强',
        dir_up: '上', dir_right: '右', dir_down: '下', dir_left: '左',
      },
      en: {
        score: 'Score', best: 'Best',
        new_game: 'New game', undo: 'Undo',
        game_over: 'Game over', you_win: 'You reached 2048!',
        play_again: 'Play again', keep_going: 'Keep going',
        brand: '← SkyZero · 2048',
        ai_move: 'AI move', ai_auto: 'AI autoplay', ai_stop: 'Stop',
        ai_loading: 'Loading AI model…', ai_thinking: 'Thinking…',
        ai_ready: 'AI ready', ai_error: 'AI failed to load',
        ai_fast: 'Faster', ai_strong: 'Stronger',
        dir_up: 'Up', dir_right: 'Right', dir_down: 'Down', dir_left: 'Left',
      },
    };
    let LANG = 'zh';
    try {
      const v = localStorage.getItem('skz_lang');
      if (v === 'zh' || v === 'en') LANG = v;
    } catch(_) {}
    function t(k) { return (STR[LANG] && STR[LANG][k]) || STR.en[k] || k; }
    function applyLang() {
      document.documentElement.lang = LANG === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('lbl_score').textContent = t('score');
      document.getElementById('lbl_best').textContent  = t('best');
      document.getElementById('new_btn').textContent   = t('new_game');
      document.getElementById('undo_btn').textContent  = t('undo');
      document.getElementById('ai_move_btn').textContent = t('ai_move');
      document.getElementById('ai_speed_fast').textContent = t('ai_fast');
      document.getElementById('ai_speed_strong').textContent = t('ai_strong');
      if (typeof refreshAiButtons === 'function') refreshAiButtons();
      document.getElementById('overlay_btn').textContent = t('play_again');
      document.getElementById('brand_link').textContent = t('brand');
      document.title = '2048 · SkyZero';
      // Refresh overlay title if it's visible (state-dependent label).
      if (typeof updateOverlay === 'function') updateOverlay();
    }

    // ---------- Theme + lang controls (mirror gomoku page) ----------
    function applyTheme(mode) {
      const resolved = (mode === 'auto')
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.dataset.themeMode = mode;
      document.querySelectorAll('#theme_seg .seg-btn').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.theme === mode));
      });
    }
    (function initThemeSeg(){
      let mode = 'auto';
      try {
        const v = localStorage.getItem('skz_theme');
        if (v === 'light' || v === 'dark') mode = v;
      } catch(_) {}
      applyTheme(mode);
      document.querySelectorAll('#theme_seg .seg-btn').forEach(b => {
        b.addEventListener('click', () => {
          const m = b.dataset.theme;
          try {
            if (m === 'auto') localStorage.removeItem('skz_theme');
            else localStorage.setItem('skz_theme', m);
          } catch(_) {}
          applyTheme(m);
        });
      });
      // Track OS changes while in auto mode.
      try {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if (document.documentElement.dataset.themeMode === 'auto') applyTheme('auto');
        });
      } catch(_) {}
    })();
    (function initLangSeg(){
      document.querySelectorAll('#lang_seg .seg-btn').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.lang === LANG));
        b.addEventListener('click', () => {
          LANG = b.dataset.lang;
          try { localStorage.setItem('skz_lang', LANG); } catch(_) {}
          document.querySelectorAll('#lang_seg .seg-btn').forEach(x => {
            x.setAttribute('aria-pressed', String(x.dataset.lang === LANG));
          });
          applyLang();
        });
      });
    })();

    // ---------- Game ----------
    const SIZE = 4;
    const GAP_PX = 10;
    // Hard ceiling: no tile may ever exceed 131072 (2^17). Two 131072 tiles
    // would merge into 262144, so merging is blocked once a tile hits MAX_TILE.
    const MAX_TILE = 131072;
    const BEST_KEY = 'skz_2048_best';
    const STATE_KEY = 'skz_2048_state';
    const UNDO_LIMIT = 20;
    // Adaptive slide timing. We pick a slide duration per move based on how
    // long it's been since the previous input:
    //   gap ≤ GAP_FAST_MS  → SLIDE_MS_MIN  (rapid swipes; tiles barely linger)
    //   gap ≥ GAP_SLOW_MS  → SLIDE_MS_MAX  (deliberate play; visible motion)
    //   in between         → linear blend
    // The chosen duration is published as `--slide-ms` on `#tiles` and read by
    // every tile's CSS transition.
    const SLIDE_MS_MAX = 120;
    const SLIDE_MS_MIN = 40;
    const GAP_FAST_MS  = 100;
    const GAP_SLOW_MS  = 300;
    const FINALIZE_PAD_MS = 10;   // wait this much after the slide before merging
    let lastInputTs = 0;          // performance.now() of the previous move

    /** @type {number[][]} */
    let grid;
    /** @type {number[][]} parallel to `grid`; 0 = empty, else tile id */
    let tileIds;
    let score = 0;
    let best  = 0;
    let history = [];          // stack of {grid, score, won} snapshots
    let won = false;
    let overlayMode = null;    // null | 'lose' | 'win'
    // Set once a run is no longer leaderboard-eligible: a move was undone.
    // Persisted in saveState so a mid-game reload can't launder it. Reset on
    // newGame().
    let tainted = false;

    // Live tile DOM, keyed by stable per-tile id. Each entry's DOM node
    // persists across moves so a CSS `transform` transition animates the slide.
    let tiles = new Map();     // id -> { v, r, c, el }
    let nextTileId = 1;

    // Bookkeeping for the post-slide finalize pass.
    let pendingMerges = [];    // { removeId, upgradeId, newV, r, c }
    let pendingSpawns = [];    // { r, c, v }
    let animTimer = 0;

    // ---------- DOM refs ----------
    const boardEl = document.getElementById('g2048_board');
    const gridEl  = document.getElementById('grid');
    const tilesEl = document.getElementById('tiles');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay_title');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');

    // Build static 4x4 background cells once.
    (function buildBg(){
      for (let i = 0; i < SIZE * SIZE; i++) {
        const c = document.createElement('div');
        c.className = 'g2048-cell';
        gridEl.appendChild(c);
      }
    })();

    // ---------- Helpers ----------
    function emptyGrid() {
      const g = new Array(SIZE);
      for (let r = 0; r < SIZE; r++) g[r] = new Array(SIZE).fill(0);
      return g;
    }
    function cloneGrid(g) { return g.map(row => row.slice()); }

    function loadBest() {
      try {
        const v = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
        best = isFinite(v) && v > 0 ? v : 0;
      } catch(_) { best = 0; }
    }
    function saveBest() {
      try { localStorage.setItem(BEST_KEY, String(best)); } catch(_) {}
    }
    function saveState() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify({ grid, score, won, tainted }));
      } catch(_) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s || !Array.isArray(s.grid) || s.grid.length !== SIZE) return false;
        for (let r = 0; r < SIZE; r++) {
          if (!Array.isArray(s.grid[r]) || s.grid[r].length !== SIZE) return false;
        }
        grid = s.grid;
        score = (typeof s.score === 'number') ? s.score : 0;
        won = !!s.won;
        tainted = !!s.tainted;
        return true;
      } catch(_) { return false; }
    }

    function cellSizePx() {
      const rect = tilesEl.getBoundingClientRect();
      return (rect.width - GAP_PX * (SIZE - 1)) / SIZE;
    }

    // Map (line-index i, slot j) -> (grid row, col) for each slide direction.
    // The line is oriented head-toward-slide, so compaction trivially writes
    // non-zeros to small j.
    function lineCoord(dir, i, j) {
      if (dir === 'left')  return [i, j];
      if (dir === 'right') return [i, SIZE - 1 - j];
      if (dir === 'up')    return [j, i];
      /* down */           return [SIZE - 1 - j, i];
    }

    function findRandomEmpty() {
      const empties = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) empties.push([r, c]);
      }
      if (empties.length === 0) return null;
      return empties[Math.floor(Math.random() * empties.length)];
    }

    function anyMovePossible() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) return true;
          const v = grid[r][c];
          if (v * 2 > MAX_TILE) continue;   // capped tiles can't merge
          if (r + 1 < SIZE && grid[r + 1][c] === v) return true;
          if (c + 1 < SIZE && grid[r][c + 1] === v) return true;
        }
      }
      return false;
    }

    function maxTile() {
      let m = 0;
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] > m) m = grid[r][c];
      }
      return m;
    }

    // ---------- Tile DOM ----------
    // Outer node owns position (translate + slide transition). Inner node owns
    // appearance and pop/merge keyframes (scale only). They never fight each
    // other for the `transform` property.
    function setTileVisuals(el, v, r, c) {
      const size = cellSizePx();
      const x = c * (size + GAP_PX);
      const y = r * (size + GAP_PX);
      el.style.width  = size + 'px';
      el.style.height = size + 'px';
      el.style.transform = `translate(${x}px, ${y}px)`;
      const inner = el.firstChild;
      const digits = String(v).length;
      const base = size * (digits <= 2 ? 0.45 : digits === 3 ? 0.36 : digits === 4 ? 0.30 : 0.24);
      inner.style.fontSize = Math.max(14, Math.round(base)) + 'px';
      inner.textContent = String(v);
      inner.setAttribute('data-v', String(v));
      if (v > 2048) inner.setAttribute('data-v-big', '');
      else inner.removeAttribute('data-v-big');
    }

    // Update only the outer transform (lets the CSS transition own the slide).
    function setTilePos(el, r, c) {
      const size = cellSizePx();
      const x = c * (size + GAP_PX);
      const y = r * (size + GAP_PX);
      el.style.transform = `translate(${x}px, ${y}px)`;
    }

    function createTileEl(v, r, c, popClass) {
      const el = document.createElement('div');
      el.className = 'g2048-tile' + (popClass ? ' ' + popClass : '');
      const inner = document.createElement('div');
      inner.className = 'g2048-tile-inner';
      el.appendChild(inner);
      // Position BEFORE inserting into the DOM. Otherwise the freshly mounted
      // outer briefly has its initial transform (identity = translate(0,0)) as
      // the previous computed value, and the CSS transition animates from
      // (0,0) to the target — making every new tile slide in from the top-left.
      setTileVisuals(el, v, r, c);
      tilesEl.appendChild(el);
      return el;
    }

    function spawnTileAt(r, c, v, popClass) {
      const id = nextTileId++;
      grid[r][c] = v;
      tileIds[r][c] = id;
      const el = createTileEl(v, r, c, popClass || 'appear');
      tiles.set(id, { v, r, c, el });
      return id;
    }

    function clearAllTiles() {
      tiles.clear();
      while (tilesEl.firstChild) tilesEl.removeChild(tilesEl.firstChild);
    }

    function rebuildTilesFromGrid(popClass) {
      tileIds = emptyGrid();
      clearAllTiles();
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] !== 0) {
          const id = nextTileId++;
          tileIds[r][c] = id;
          const el = createTileEl(grid[r][c], r, c, popClass);
          tiles.set(id, { v: grid[r][c], r, c, el });
        }
      }
    }

    function reflowTiles() {
      for (const t of tiles.values()) setTileVisuals(t.el, t.v, t.r, t.c);
    }

    function updateScoreDom() {
      scoreEl.textContent = String(score);
      bestEl.textContent  = String(best);
    }

    function updateOverlay() {
      if (overlayMode === 'lose') {
        overlayTitle.textContent = t('game_over');
        document.getElementById('overlay_btn').textContent = t('play_again');
        overlayEl.classList.add('show');
      } else if (overlayMode === 'win') {
        overlayTitle.textContent = t('you_win');
        document.getElementById('overlay_btn').textContent = t('keep_going');
        overlayEl.classList.add('show');
      } else {
        overlayEl.classList.remove('show');
      }
      if (typeof refreshAiButtons === 'function') refreshAiButtons();
    }

    // ---------- Move / merge with identity ----------
    // Process one line. Returns { newIds, newVals, gained, moves }.
    // moves: per source tile, where it ended up in the output line and whether
    // it merged into a survivor (whose id stays in `newIds`).
    function moveLine(idsLine, valsLine) {
      const newIds = new Array(SIZE).fill(0);
      const newVals = new Array(SIZE).fill(0);
      const moves = [];
      let writeIdx = 0;
      let canMerge = true;
      let gained = 0;
      for (let i = 0; i < SIZE; i++) {
        const id = idsLine[i];
        const v  = valsLine[i];
        if (id === 0) continue;
        // Block the merge that would exceed the ceiling — two MAX_TILE tiles
        // stay separate instead of forming 131072.
        if (writeIdx > 0 && canMerge && newVals[writeIdx - 1] === v && v * 2 <= MAX_TILE) {
          const surviveId = newIds[writeIdx - 1];
          const merged = v * 2;
          gained += merged;
          newVals[writeIdx - 1] = merged;
          moves.push({ id, toIdx: writeIdx - 1, mergedWith: surviveId, newV: merged });
          canMerge = false;
        } else {
          newIds[writeIdx] = id;
          newVals[writeIdx] = v;
          moves.push({ id, toIdx: writeIdx, mergedWith: null });
          writeIdx++;
          canMerge = true;
        }
      }
      return { newIds, newVals, moves, gained };
    }

    function doMove(dir) {
      if (overlayMode === 'lose') return;
      // Snap any in-flight animation to its committed state before we mutate.
      finalizeAnimation();

      // Pick a slide duration based on how recently the previous input fired.
      // Faster input → shorter slide, so the next move doesn't pile up behind
      // a leisurely transition. The duration is published as a CSS custom
      // property so every tile's transition picks it up automatically.
      const now = performance.now();
      let slideMs = SLIDE_MS_MAX;
      if (lastInputTs > 0) {
        const gap = now - lastInputTs;
        if (gap <= GAP_FAST_MS) {
          slideMs = SLIDE_MS_MIN;
        } else if (gap < GAP_SLOW_MS) {
          const t = (gap - GAP_FAST_MS) / (GAP_SLOW_MS - GAP_FAST_MS);
          slideMs = Math.round(SLIDE_MS_MIN + (SLIDE_MS_MAX - SLIDE_MS_MIN) * t);
        }
      }
      lastInputTs = now;
      tilesEl.style.setProperty('--slide-ms', slideMs + 'ms');

      const snapshot = { grid: cloneGrid(grid), score, won };

      const newGrid = emptyGrid();
      const newIds  = emptyGrid();
      const allMoves = [];   // each: { id, toIdx, mergedWith, newV?, i, dir }
      let totalGained = 0;
      let anyChange = false;

      for (let i = 0; i < SIZE; i++) {
        const idsLine  = new Array(SIZE);
        const valsLine = new Array(SIZE);
        for (let j = 0; j < SIZE; j++) {
          const [r, c] = lineCoord(dir, i, j);
          idsLine[j]  = tileIds[r][c];
          valsLine[j] = grid[r][c];
        }
        const res = moveLine(idsLine, valsLine);
        totalGained += res.gained;
        for (let j = 0; j < SIZE; j++) {
          const [r, c] = lineCoord(dir, i, j);
          newGrid[r][c] = res.newVals[j];
          newIds[r][c]  = res.newIds[j];
          if (idsLine[j] !== res.newIds[j] || valsLine[j] !== res.newVals[j]) anyChange = true;
        }
        for (const m of res.moves) allMoves.push(Object.assign({}, m, { i, dir }));
      }
      if (!anyChange) return;

      // Commit grid state.
      history.push(snapshot);
      if (history.length > UNDO_LIMIT) history.shift();
      grid = newGrid;
      tileIds = newIds;
      score += totalGained;
      if (score > best) { best = score; saveBest(); }

      // Trigger slides. Each existing tile gets its `transform` updated to its
      // destination; the CSS transition handles the actual motion.
      for (const m of allMoves) {
        const [toR, toC] = lineCoord(m.dir, m.i, m.toIdx);
        const tile = tiles.get(m.id);
        if (!tile) continue;
        tile.r = toR;
        tile.c = toC;
        setTilePos(tile.el, toR, toC);
        if (m.mergedWith !== null) {
          // The merging tile slides into the survivor's cell; both DOM nodes
          // overlap momentarily, then the merging one is removed and the
          // survivor pops up with its new value.
          pendingMerges.push({
            removeId: m.id,
            upgradeId: m.mergedWith,
            newV: m.newV,
            r: toR, c: toC,
          });
        }
      }

      // Queue spawn of a new random tile for AFTER the slide. We do NOT write
      // it into `grid` yet — that happens in finalizeAnimation — so a rapid
      // second move that re-slides finds an empty cell where the spawn will
      // land.
      const empty = findRandomEmpty();
      if (empty) {
        const v = Math.random() < 0.9 ? 2 : 4;
        pendingSpawns.push({ r: empty[0], c: empty[1], v });
      }

      updateScoreDom();

      if (animTimer) clearTimeout(animTimer);
      animTimer = setTimeout(() => { animTimer = 0; finalizeAnimation(); }, slideMs + FINALIZE_PAD_MS);
    }

    function finalizeAnimation() {
      if (animTimer) { clearTimeout(animTimer); animTimer = 0; }
      if (pendingMerges.length === 0 && pendingSpawns.length === 0) return;

      for (const m of pendingMerges) {
        const dying = tiles.get(m.removeId);
        if (dying && dying.el && dying.el.parentNode) dying.el.parentNode.removeChild(dying.el);
        tiles.delete(m.removeId);
        const survivor = tiles.get(m.upgradeId);
        if (survivor) {
          survivor.v = m.newV;
          setTileVisuals(survivor.el, survivor.v, survivor.r, survivor.c);
          // Restart the merge keyframe by toggling the class.
          survivor.el.classList.remove('merged');
          void survivor.el.offsetWidth;  // force reflow
          survivor.el.classList.add('merged');
        }
      }
      pendingMerges = [];

      for (const s of pendingSpawns) {
        // The cell should still be empty (snap callers haven't moved between),
        // but be defensive.
        if (grid[s.r][s.c] === 0) spawnTileAt(s.r, s.c, s.v, 'appear');
      }
      pendingSpawns = [];

      if (!won && maxTile() >= 2048) {
        won = true;
        overlayMode = 'win';
      } else if (!anyMovePossible()) {
        overlayMode = 'lose';
      }
      // Report a genuine (un-edited) game's score to the leaderboard. Server
      // keeps the max; SkzLB dedupes, so re-reporting on win→keep-going→lose
      // is harmless.
      if (overlayMode && !tainted && window.SkzLB) window.SkzLB.submit('2048', score);
      saveState();
      updateOverlay();
    }

    function undo() {
      finalizeAnimation();
      const prev = history.pop();
      if (!prev) return;
      tainted = true;   // undoing a move disqualifies the run from the leaderboard
      grid = prev.grid;
      score = prev.score;
      won = prev.won;
      overlayMode = null;
      rebuildTilesFromGrid(null);  // no pop animation on undo
      updateScoreDom();
      updateOverlay();
      saveState();
    }

    function newGame() {
      if (animTimer) { clearTimeout(animTimer); animTimer = 0; }
      pendingMerges = [];
      pendingSpawns = [];
      grid = emptyGrid();
      tileIds = emptyGrid();
      score = 0;
      won = false;
      history = [];
      overlayMode = null;
      tainted = false;
      clearAllTiles();
      const e1 = findRandomEmpty();
      if (e1) spawnTileAt(e1[0], e1[1], Math.random() < 0.9 ? 2 : 4, 'appear');
      const e2 = findRandomEmpty();
      if (e2) spawnTileAt(e2[0], e2[1], Math.random() < 0.9 ? 2 : 4, 'appear');
      updateScoreDom();
      updateOverlay();
      saveState();
    }

    // ---------- Input ----------
    const KEY_DIR = {
      'ArrowLeft': 'left', 'ArrowRight': 'right',
      'ArrowUp': 'up', 'ArrowDown': 'down',
      'a': 'left', 'A': 'left',
      'd': 'right', 'D': 'right',
      'w': 'up', 'W': 'up',
      's': 'down', 'S': 'down',
    };
    window.addEventListener('keydown', (e) => {
      // Ignore when typing in an input/textarea (none on this page today, but
      // be defensive).
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const d = KEY_DIR[e.key];
      if (!d) return;
      e.preventDefault();
      doMove(d);
    }, { passive: false });

    // Touch swipe
    let touchStart = null;
    boardEl.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) { touchStart = null; return; }
      const t0 = e.touches[0];
      touchStart = { x: t0.clientX, y: t0.clientY };
    }, { passive: true });
    boardEl.addEventListener('touchend', (e) => {
      if (!touchStart) return;
      const t0 = e.changedTouches[0];
      const dx = t0.clientX - touchStart.x;
      const dy = t0.clientY - touchStart.y;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const THR = 24;
      if (Math.max(adx, ady) < THR) { touchStart = null; return; }
      if (adx > ady) doMove(dx > 0 ? 'right' : 'left');
      else            doMove(dy > 0 ? 'down'  : 'up');
      touchStart = null;
    }, { passive: true });

    // Buttons
    document.getElementById('new_btn').addEventListener('click', newGame);
    document.getElementById('undo_btn').addEventListener('click', undo);
    document.getElementById('overlay_btn').addEventListener('click', () => {
      if (overlayMode === 'win') {
        // "Keep going" — dismiss overlay, don't trigger again until next game.
        overlayMode = null;
        updateOverlay();
      } else {
        newGame();
      }
    });

    // Re-position tiles on resize (their pixel coords depend on board width).
    let resizeRaf = 0;
    window.addEventListener('resize', () => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => { resizeRaf = 0; reflowTiles(); });
    });

    // ---------- AI (Stochastic Gumbel AlphaZero, browser-side) ----------
    // Loads the exported 2048 net (models/2048.onnx) in a Web Worker and plays
    // moves via the full afterstate Stochastic Gumbel AlphaZero MCTS (mcts2048.js,
    // a port of SkyZero_2048/python/mcts.py): a tree of DECISION + CHANCE nodes,
    // PUCT with MuZero min-max Q-norm, and Gumbel sequential halving at the root.
    // `value` reported back is the search's expected discounted score from here.
    // An AI-assisted run is marked `tainted` so it never posts a score to the
    // human leaderboard.
    // Cache-bust: .onnx is served `immutable, max-age=1yr` (see _headers), so the
    // browser would otherwise never refetch an updated model — a plain reload would
    // keep showing the stale net, and the only way to get the new one would be a
    // "clear site data", which also wipes the leaderboard token in localStorage.
    // Bump AI_MODEL_VERSION whenever models/2048.onnx is re-exported.
    const AI_MODEL_VERSION = 'b3c64-vt-iter89';
    const AI_MODEL_URL = 'models/2048.onnx?v=' + AI_MODEL_VERSION;
    // AI speed/strength: the slider sets the MCTS simulation budget linearly
    // from AI_SIMS_MIN (faster, weaker) to AI_SIMS_MAX (stronger, slower). The
    // between-move autoplay delay grows with strength so strong games stay
    // watchable on a fast machine instead of flashing by.
    const AI_SIMS_MIN = 48, AI_SIMS_MAX = 256, AI_DELAY_MAX_MS = 650;
    let aiReady = false, aiBusy = false, aiAuto = false, aiSeq = 0, aiWorker = null;
    const aiMoveBtn = document.getElementById('ai_move_btn');
    const aiAutoBtn = document.getElementById('ai_auto_btn');
    const aiStatusEl = document.getElementById('ai_status');
    const aiSpeedEl = document.getElementById('ai_speed');

    function setAiStatus(text) { if (aiStatusEl) aiStatusEl.textContent = text || ''; }
    function fmtMB(bytes) { return (Number(bytes || 0) / 1048576).toFixed(1); }
    function aiSims() {
      const v = aiSpeedEl ? parseInt(aiSpeedEl.value, 10) : 64;
      return Math.min(AI_SIMS_MAX, Math.max(AI_SIMS_MIN, v || 64));
    }
    function aiNorm() { return (aiSims() - AI_SIMS_MIN) / (AI_SIMS_MAX - AI_SIMS_MIN); }
    function aiDelay() { return Math.round(aiNorm() * AI_DELAY_MAX_MS); }

    function refreshAiButtons() {
      if (!aiMoveBtn || !aiAutoBtn) return;
      aiAutoBtn.textContent = aiAuto ? t('ai_stop') : t('ai_auto');
      aiAutoBtn.setAttribute('aria-pressed', String(aiAuto));
      const gameOver = (overlayMode === 'lose');
      aiMoveBtn.disabled = !aiReady || gameOver || aiBusy || aiAuto;
      aiAutoBtn.disabled = !aiReady || gameOver;
    }

    function startAiWorker() {
      try {
        aiWorker = new Worker('worker2048.js?v=' + Date.now());
      } catch (e) { setAiStatus(t('ai_error')); return; }
      aiWorker.onmessage = (ev) => {
        const m = ev.data || {};
        if (m.type === 'model-progress') {
          if (!aiReady) {
            let s = t('ai_loading');
            if (m.percent != null) s += ' ' + Math.round(m.percent) + '%';
            if (m.total) s += ' (' + fmtMB(m.loaded) + '/' + fmtMB(m.total) + ' MB)';
            else if (m.loaded) s += ' (' + fmtMB(m.loaded) + ' MB)';
            setAiStatus(s);
          }
        } else if (m.type === 'ready') {
          aiReady = true; setAiStatus(''); refreshAiButtons();
        } else if (m.type === 'move') {
          onAiMove(m);
        } else if (m.type === 'error') {
          aiBusy = false; aiAuto = false;
          setAiStatus(t('ai_error') + ': ' + m.message); refreshAiButtons();
        }
      };
      aiWorker.onerror = () => {
        aiBusy = false; aiAuto = false; setAiStatus(t('ai_error')); refreshAiButtons();
      };
      setAiStatus(t('ai_loading'));
      aiWorker.postMessage({ type: 'init', model: AI_MODEL_URL });
    }

    function requestAiMove() {
      if (!aiReady || aiBusy) return;
      // Flush any in-flight slide so the worker sees the settled board (incl.
      // the freshly spawned tile) and any just-reached win/lose state.
      finalizeAnimation();
      if (overlayMode === 'win') { overlayMode = null; updateOverlay(); }
      if (overlayMode === 'lose' || !anyMovePossible()) {
        aiAuto = false; refreshAiButtons(); return;
      }
      // Asking the AI to move disqualifies the run from the human leaderboard
      // (set here, the instant we dispatch, so a 托管 run can never submit).
      tainted = true;
      aiBusy = true; setAiStatus(t('ai_thinking')); refreshAiButtons();
      aiWorker.postMessage({ type: 'think', id: ++aiSeq, grid: cloneGrid(grid), sims: aiSims() });
    }

    function onAiMove(m) {
      aiBusy = false;
      if (m.terminal) { aiAuto = false; setAiStatus(''); refreshAiButtons(); return; }
      setAiStatus('AI ▸ ' + t('dir_' + m.dir));
      doMove(m.dir);
      refreshAiButtons();
      // Read the slider live each move so dragging it mid-autoplay takes effect.
      if (aiAuto) setTimeout(requestAiMove, aiDelay());
    }

    aiMoveBtn.addEventListener('click', () => { if (!aiAuto) requestAiMove(); });
    aiAutoBtn.addEventListener('click', () => {
      aiAuto = !aiAuto; refreshAiButtons();
      if (aiAuto) requestAiMove();
    });
    startAiWorker();

    // ---------- Boot ----------
    loadBest();
    const hadSavedState = loadState();
    if (!hadSavedState || !grid) {
      grid = emptyGrid();
      tileIds = emptyGrid();
      // Defer initial DOM creation until layout settles so tile sizes are right.
      requestAnimationFrame(() => {
        const e1 = findRandomEmpty();
        if (e1) spawnTileAt(e1[0], e1[1], Math.random() < 0.9 ? 2 : 4, 'appear');
        const e2 = findRandomEmpty();
        if (e2) spawnTileAt(e2[0], e2[1], Math.random() < 0.9 ? 2 : 4, 'appear');
        updateScoreDom();
        saveState();
      });
    } else {
      // Recreate tile DOM from the loaded grid (after layout settles).
      requestAnimationFrame(() => {
        rebuildTilesFromGrid('appear');
        updateScoreDom();
      });
    }
    applyLang();
    updateScoreDom();
    updateOverlay();
    boardEl.focus({ preventScroll: true });
  })();
  </script>
</body>
</html>
