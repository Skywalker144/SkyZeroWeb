<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>2048 · SkyZero</title>
  <link rel="preload" href="fonts/Inter-Regular.woff2"  as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    // Reuse the same theme/lang prefs as the Gomoku page so style stays
    // consistent across the two games.
    (function(){
      try {
        var saved = localStorage.getItem('skz_theme');
        var mode = (saved === 'light' || saved === 'dark') ? saved : 'auto';
        var resolved = (mode === 'auto')
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      } catch(e) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.themeMode = 'auto';
      }
    })();
    (function(){
      try {
        var lang = localStorage.getItem('skz_lang');
        if (lang !== 'zh' && lang !== 'en') lang = 'zh';
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      } catch(e) {
        document.documentElement.lang = 'zh-CN';
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 2048-specific styles. Theme colors come from style.css variables so
       light/dark mode follow the gomoku page automatically. */
    .g2048-app {
      max-width: 520px; margin: 0 auto; padding: 8px 16px 24px;
      display: flex; flex-direction: column; gap: 14px;
      touch-action: none;
    }
    .g2048-scores {
      display: flex; gap: 10px; justify-content: center;
    }
    .g2048-score {
      flex: 1; min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      text-align: center;
    }
    .g2048-score-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--fg-muted);
    }
    .g2048-score-value {
      font-family: var(--font-mono);
      font-size: 22px; font-weight: 700; color: var(--fg);
      line-height: 1.1; margin-top: 2px;
    }
    .g2048-actions {
      display: flex; gap: 10px; justify-content: center;
    }
    .g2048-board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px;
      box-sizing: border-box;
      box-shadow: var(--shadow-xs);
      user-select: none;
      -webkit-user-select: none;
    }
    .g2048-grid {
      position: absolute; inset: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
    }
    .g2048-cell {
      background: color-mix(in srgb, var(--fg-subtle) 18%, transparent);
      border-radius: var(--radius-md);
    }
    .g2048-tiles {
      position: absolute; inset: 10px;
      pointer-events: none;
    }
    .g2048-tile {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans);
      font-weight: 700;
      border-radius: var(--radius-md);
      transition: transform 90ms ease-out;
      will-change: transform;
    }
    .g2048-tile.appear { animation: g2048-pop 140ms ease-out; }
    .g2048-tile.merged { animation: g2048-merge 160ms ease-out; z-index: 2; }
    @keyframes g2048-pop {
      from { transform: var(--pos) scale(0.0); }
      60%  { transform: var(--pos) scale(1.08); }
      to   { transform: var(--pos) scale(1); }
    }
    @keyframes g2048-merge {
      0%   { transform: var(--pos) scale(1); }
      50%  { transform: var(--pos) scale(1.18); }
      100% { transform: var(--pos) scale(1); }
    }
    /* Tile palette — classic 2048 colors, tuned to look OK in dark mode too. */
    .g2048-tile[data-v="2"]    { background:#eee4da; color:#776e65; }
    .g2048-tile[data-v="4"]    { background:#ede0c8; color:#776e65; }
    .g2048-tile[data-v="8"]    { background:#f2b179; color:#f9f6f2; }
    .g2048-tile[data-v="16"]   { background:#f59563; color:#f9f6f2; }
    .g2048-tile[data-v="32"]   { background:#f67c5f; color:#f9f6f2; }
    .g2048-tile[data-v="64"]   { background:#f65e3b; color:#f9f6f2; }
    .g2048-tile[data-v="128"]  { background:#edcf72; color:#f9f6f2; }
    .g2048-tile[data-v="256"]  { background:#edcc61; color:#f9f6f2; }
    .g2048-tile[data-v="512"]  { background:#edc850; color:#f9f6f2; }
    .g2048-tile[data-v="1024"] { background:#edc53f; color:#f9f6f2; }
    .g2048-tile[data-v="2048"] { background:#edc22e; color:#f9f6f2; }
    .g2048-tile[data-v-big]    { background:#3c3a32; color:#f9f6f2; }
    .g2048-overlay {
      position: absolute; inset: 0;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      backdrop-filter: blur(2px);
      border-radius: var(--radius-lg);
      z-index: 3;
    }
    .g2048-overlay.show { display: flex; }
    .g2048-overlay-title {
      font-size: 28px; font-weight: 700; color: var(--fg);
    }
    .g2048-hint {
      font-size: 12px; color: var(--fg-muted); text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <a class="brand-title" href="index.html" style="text-decoration:none;color:inherit;"
           title="返回五子棋" id="brand_link">← SkyZero · 2048</a>
      </div>
      <div class="topbar-actions">
        <div class="seg-row compact" id="lang_seg" role="group" aria-label="Switch language">
          <button class="seg-btn" data-lang="zh" aria-pressed="true">中</button>
          <button class="seg-btn" data-lang="en" aria-pressed="false">EN</button>
        </div>
        <div class="seg-row compact" id="theme_seg" role="group" aria-label="Toggle theme">
          <button class="seg-btn" data-theme="auto" aria-pressed="true" aria-label="Auto" title="Auto">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="8" cy="8" r="6"></circle>
              <path d="M8 2 a6 6 0 0 1 0 12 z" fill="currentColor" stroke="none"></path>
            </svg>
          </button>
          <button class="seg-btn" data-theme="light" aria-pressed="false" aria-label="Light" title="Light">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="8" cy="8" r="3"></circle>
              <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"></path>
            </svg>
          </button>
          <button class="seg-btn" data-theme="dark" aria-pressed="false" aria-label="Dark" title="Dark">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M13.5 9.5A5.5 5.5 0 0 1 6.5 2.5a5.5 5.5 0 1 0 7 7z"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="g2048-app">
      <div class="g2048-scores">
        <div class="g2048-score">
          <div class="g2048-score-label" id="lbl_score">分数</div>
          <div class="g2048-score-value" id="score">0</div>
        </div>
        <div class="g2048-score">
          <div class="g2048-score-label" id="lbl_best">最高分</div>
          <div class="g2048-score-value" id="best">0</div>
        </div>
      </div>
      <div class="g2048-actions">
        <button class="btn primary" id="new_btn">新对局</button>
        <button class="btn danger-ghost" id="undo_btn">撤销</button>
      </div>
      <div class="g2048-board" id="board" tabindex="0" aria-label="2048 board">
        <div class="g2048-grid" id="grid"></div>
        <div class="g2048-tiles" id="tiles"></div>
        <div class="g2048-overlay" id="overlay">
          <div class="g2048-overlay-title" id="overlay_title">游戏结束</div>
          <button class="btn primary" id="overlay_btn">再来一局</button>
        </div>
      </div>
      <div class="g2048-hint" id="hint">↑ ↓ ← → 或 WASD;手机上滑动屏幕</div>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    // ---------- i18n (tiny, just for this page) ----------
    const STR = {
      zh: {
        score: '分数', best: '最高分',
        new_game: '新对局', undo: '撤销',
        game_over: '游戏结束', you_win: '到达 2048!',
        play_again: '再来一局', keep_going: '继续',
        hint: '↑ ↓ ← → 或 WASD;手机上滑动屏幕',
        brand: '← SkyZero · 2048',
      },
      en: {
        score: 'Score', best: 'Best',
        new_game: 'New game', undo: 'Undo',
        game_over: 'Game over', you_win: 'You reached 2048!',
        play_again: 'Play again', keep_going: 'Keep going',
        hint: 'Arrow keys / WASD · swipe on touch',
        brand: '← SkyZero · 2048',
      },
    };
    let LANG = 'zh';
    try {
      const v = localStorage.getItem('skz_lang');
      if (v === 'zh' || v === 'en') LANG = v;
    } catch(_) {}
    function t(k) { return (STR[LANG] && STR[LANG][k]) || STR.en[k] || k; }
    function applyLang() {
      document.documentElement.lang = LANG === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('lbl_score').textContent = t('score');
      document.getElementById('lbl_best').textContent  = t('best');
      document.getElementById('new_btn').textContent   = t('new_game');
      document.getElementById('undo_btn').textContent  = t('undo');
      document.getElementById('overlay_btn').textContent = t('play_again');
      document.getElementById('hint').textContent      = t('hint');
      document.getElementById('brand_link').textContent = t('brand');
      document.title = '2048 · SkyZero';
      // Refresh overlay title if it's visible (state-dependent label updated in render()).
      render();
    }

    // ---------- Theme + lang controls (mirror gomoku page) ----------
    function applyTheme(mode) {
      const resolved = (mode === 'auto')
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.dataset.themeMode = mode;
      document.querySelectorAll('#theme_seg .seg-btn').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.theme === mode));
      });
    }
    (function initThemeSeg(){
      let mode = 'auto';
      try {
        const v = localStorage.getItem('skz_theme');
        if (v === 'light' || v === 'dark') mode = v;
      } catch(_) {}
      applyTheme(mode);
      document.querySelectorAll('#theme_seg .seg-btn').forEach(b => {
        b.addEventListener('click', () => {
          const m = b.dataset.theme;
          try {
            if (m === 'auto') localStorage.removeItem('skz_theme');
            else localStorage.setItem('skz_theme', m);
          } catch(_) {}
          applyTheme(m);
        });
      });
      // Track OS changes while in auto mode.
      try {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if (document.documentElement.dataset.themeMode === 'auto') applyTheme('auto');
        });
      } catch(_) {}
    })();
    (function initLangSeg(){
      document.querySelectorAll('#lang_seg .seg-btn').forEach(b => {
        b.setAttribute('aria-pressed', String(b.dataset.lang === LANG));
        b.addEventListener('click', () => {
          LANG = b.dataset.lang;
          try { localStorage.setItem('skz_lang', LANG); } catch(_) {}
          document.querySelectorAll('#lang_seg .seg-btn').forEach(x => {
            x.setAttribute('aria-pressed', String(x.dataset.lang === LANG));
          });
          applyLang();
        });
      });
    })();

    // ---------- Game ----------
    const SIZE = 4;
    const BEST_KEY = 'skz_2048_best';
    const STATE_KEY = 'skz_2048_state';
    const UNDO_LIMIT = 20;

    /** @type {number[][]} */
    let grid;
    let score = 0;
    let best  = 0;
    let history = [];          // stack of {grid, score} snapshots
    let won = false;           // set true once 2048 first appears (continues playing)
    let overlayMode = null;    // null | 'lose' | 'win'
    // Stable per-tile id so the DOM element survives between slides (allows
    // CSS transform animations). Mapped as Map<id, {v, r, c, el}>.
    let tiles = new Map();
    let nextTileId = 1;

    function emptyGrid() {
      const g = new Array(SIZE);
      for (let r = 0; r < SIZE; r++) {
        g[r] = new Array(SIZE).fill(0);
      }
      return g;
    }
    function cloneGrid(g) {
      return g.map(row => row.slice());
    }

    function loadBest() {
      try {
        const v = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
        best = isFinite(v) && v > 0 ? v : 0;
      } catch(_) { best = 0; }
    }
    function saveBest() {
      try { localStorage.setItem(BEST_KEY, String(best)); } catch(_) {}
    }
    function saveState() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify({
          grid, score, won,
        }));
      } catch(_) {}
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        if (!raw) return false;
        const s = JSON.parse(raw);
        if (!s || !Array.isArray(s.grid) || s.grid.length !== SIZE) return false;
        for (let r = 0; r < SIZE; r++) {
          if (!Array.isArray(s.grid[r]) || s.grid[r].length !== SIZE) return false;
        }
        grid = s.grid;
        score = (typeof s.score === 'number') ? s.score : 0;
        won = !!s.won;
        return true;
      } catch(_) { return false; }
    }

    function addRandomTile() {
      const empties = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) empties.push([r, c]);
        }
      }
      if (empties.length === 0) return;
      const [r, c] = empties[Math.floor(Math.random() * empties.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    /**
     * Apply move in `dir` ∈ {'left','right','up','down'}.
     * Returns true if the move changed the board (and a new tile should spawn).
     * Updates `score`.
     */
    function applyMove(dir) {
      const before = cloneGrid(grid);
      const gained = slideAndMergeAll(dir);
      const changed = !gridsEqual(before, grid);
      if (changed) score += gained;
      return changed;
    }

    function gridsEqual(a, b) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (a[r][c] !== b[r][c]) return false;
        }
      }
      return true;
    }

    /**
     * Slide all rows/cols toward `dir`, merging equal pairs once each.
     * Returns total score gained from merges.
     */
    function slideAndMergeAll(dir) {
      let gained = 0;
      const lines = extractLines(dir);
      const newLines = lines.map(line => {
        const compacted = line.filter(v => v !== 0);
        for (let i = 0; i < compacted.length - 1; i++) {
          if (compacted[i] === compacted[i + 1]) {
            const merged = compacted[i] * 2;
            gained += merged;
            compacted[i] = merged;
            compacted.splice(i + 1, 1);
          }
        }
        while (compacted.length < SIZE) compacted.push(0);
        return compacted;
      });
      writeLines(dir, newLines);
      return gained;
    }

    // For each direction, "lines" are oriented so the head of the line is the
    // direction the tiles slide toward. Compaction then trivially pushes
    // non-zeros to the front, merging adjacent equals.
    function extractLines(dir) {
      const lines = [];
      for (let i = 0; i < SIZE; i++) {
        const line = [];
        for (let j = 0; j < SIZE; j++) {
          let r, c;
          if (dir === 'left')  { r = i; c = j; }
          else if (dir === 'right') { r = i; c = SIZE - 1 - j; }
          else if (dir === 'up')    { r = j; c = i; }
          else /* down */           { r = SIZE - 1 - j; c = i; }
          line.push(grid[r][c]);
        }
        lines.push(line);
      }
      return lines;
    }
    function writeLines(dir, lines) {
      for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
          let r, c;
          if (dir === 'left')  { r = i; c = j; }
          else if (dir === 'right') { r = i; c = SIZE - 1 - j; }
          else if (dir === 'up')    { r = j; c = i; }
          else /* down */           { r = SIZE - 1 - j; c = i; }
          grid[r][c] = lines[i][j];
        }
      }
    }

    function anyMovePossible() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] === 0) return true;
          const v = grid[r][c];
          if (r + 1 < SIZE && grid[r + 1][c] === v) return true;
          if (c + 1 < SIZE && grid[r][c + 1] === v) return true;
        }
      }
      return false;
    }

    function maxTile() {
      let m = 0;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] > m) m = grid[r][c];
        }
      }
      return m;
    }

    function pushHistory() {
      history.push({ grid: cloneGrid(grid), score, won });
      if (history.length > UNDO_LIMIT) history.shift();
    }
    function undo() {
      const prev = history.pop();
      if (!prev) return;
      grid = prev.grid;
      score = prev.score;
      won = prev.won;
      overlayMode = null;
      saveState();
      // Reset tile DOM so transforms re-seat from scratch.
      tiles.clear();
      const tilesEl = document.getElementById('tiles');
      while (tilesEl.firstChild) tilesEl.removeChild(tilesEl.firstChild);
      render();
    }

    function newGame() {
      grid = emptyGrid();
      score = 0;
      won = false;
      history = [];
      overlayMode = null;
      addRandomTile();
      addRandomTile();
      saveState();
      tiles.clear();
      const tilesEl = document.getElementById('tiles');
      while (tilesEl.firstChild) tilesEl.removeChild(tilesEl.firstChild);
      render(true);
    }

    function doMove(dir) {
      if (overlayMode === 'lose') return;
      const snapshot = { grid: cloneGrid(grid), score, won };
      const changed = applyMove(dir);
      if (!changed) return;
      history.push(snapshot);
      if (history.length > UNDO_LIMIT) history.shift();
      addRandomTile();
      if (score > best) { best = score; saveBest(); }
      if (!won && maxTile() >= 2048) {
        won = true;
        overlayMode = 'win';
      } else if (!anyMovePossible()) {
        overlayMode = 'lose';
      }
      saveState();
      render();
    }

    // ---------- Rendering ----------
    const boardEl = document.getElementById('board');
    const gridEl  = document.getElementById('grid');
    const tilesEl = document.getElementById('tiles');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay_title');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');

    // Build static 4x4 background cells once.
    (function buildBg(){
      for (let i = 0; i < SIZE * SIZE; i++) {
        const c = document.createElement('div');
        c.className = 'g2048-cell';
        gridEl.appendChild(c);
      }
    })();

    function cellSizePx() {
      const rect = tilesEl.getBoundingClientRect();
      // Same gap as .g2048-grid (10px). Tile size: (w - 3*gap) / 4.
      const gap = 10;
      return (rect.width - gap * (SIZE - 1)) / SIZE;
    }

    function render(initial) {
      scoreEl.textContent = String(score);
      bestEl.textContent  = String(best);

      // Build target {r,c,v} list from current grid. We allocate a stable id
      // for each cell position so the same DOM node can transform between
      // renders even though we don't track per-tile motion across merges.
      // (Simple model: identity = (r,c) of current frame.)
      const size = cellSizePx();
      const gap = 10;
      const desired = new Map();   // key "r,c" -> v
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = grid[r][c];
          if (v !== 0) desired.set(r + ',' + c, { r, c, v });
        }
      }

      // Remove all stale tiles; rebuild fresh each frame keyed by (r,c).
      // We accept losing per-tile slide animation in exchange for code
      // simplicity — the pop-in animation on appearance still provides
      // visual feedback.
      const seen = new Set();
      for (const [key, info] of desired) {
        let entry = tiles.get(key);
        if (!entry || entry.v !== info.v) {
          // Replace the element so the appear/merge animation re-triggers.
          if (entry && entry.el && entry.el.parentNode) entry.el.parentNode.removeChild(entry.el);
          const el = document.createElement('div');
          el.className = 'g2048-tile ' + (initial ? 'appear' : (entry ? 'merged' : 'appear'));
          el.textContent = String(info.v);
          setTileVisuals(el, info.v, info.r, info.c, size, gap);
          tilesEl.appendChild(el);
          tiles.set(key, { v: info.v, r: info.r, c: info.c, el });
        } else {
          setTileVisuals(entry.el, info.v, info.r, info.c, size, gap);
        }
        seen.add(key);
      }
      // Delete tiles whose position is no longer occupied.
      for (const key of Array.from(tiles.keys())) {
        if (!seen.has(key)) {
          const e = tiles.get(key);
          if (e && e.el && e.el.parentNode) e.el.parentNode.removeChild(e.el);
          tiles.delete(key);
        }
      }

      // Overlay
      if (overlayMode === 'lose') {
        overlayTitle.textContent = t('game_over');
        document.getElementById('overlay_btn').textContent = t('play_again');
        overlayEl.classList.add('show');
      } else if (overlayMode === 'win') {
        overlayTitle.textContent = t('you_win');
        document.getElementById('overlay_btn').textContent = t('keep_going');
        overlayEl.classList.add('show');
      } else {
        overlayEl.classList.remove('show');
      }
    }

    function setTileVisuals(el, v, r, c, size, gap) {
      const x = c * (size + gap);
      const y = r * (size + gap);
      el.style.width  = size + 'px';
      el.style.height = size + 'px';
      el.style.setProperty('--pos', `translate(${x}px, ${y}px)`);
      el.style.transform = `translate(${x}px, ${y}px)`;
      // Font shrinks for longer numbers.
      const digits = String(v).length;
      const base = size * (digits <= 2 ? 0.45 : digits === 3 ? 0.36 : digits === 4 ? 0.30 : 0.24);
      el.style.fontSize = Math.max(14, Math.round(base)) + 'px';
      el.textContent = String(v);
      // Re-apply data-v for palette.
      el.setAttribute('data-v', String(v));
      if (v > 2048) el.setAttribute('data-v-big', '');
      else el.removeAttribute('data-v-big');
    }

    // ---------- Input ----------
    const KEY_DIR = {
      'ArrowLeft': 'left', 'ArrowRight': 'right',
      'ArrowUp': 'up', 'ArrowDown': 'down',
      'a': 'left', 'A': 'left',
      'd': 'right', 'D': 'right',
      'w': 'up', 'W': 'up',
      's': 'down', 'S': 'down',
    };
    window.addEventListener('keydown', (e) => {
      // Ignore when typing in an input/textarea (none on this page today, but
      // be defensive).
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      const d = KEY_DIR[e.key];
      if (!d) return;
      e.preventDefault();
      doMove(d);
    }, { passive: false });

    // Touch swipe
    let touchStart = null;
    boardEl.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) { touchStart = null; return; }
      const t0 = e.touches[0];
      touchStart = { x: t0.clientX, y: t0.clientY };
    }, { passive: true });
    boardEl.addEventListener('touchend', (e) => {
      if (!touchStart) return;
      const t0 = e.changedTouches[0];
      const dx = t0.clientX - touchStart.x;
      const dy = t0.clientY - touchStart.y;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const THR = 24;
      if (Math.max(adx, ady) < THR) { touchStart = null; return; }
      if (adx > ady) doMove(dx > 0 ? 'right' : 'left');
      else            doMove(dy > 0 ? 'down'  : 'up');
      touchStart = null;
    }, { passive: true });

    // Buttons
    document.getElementById('new_btn').addEventListener('click', newGame);
    document.getElementById('undo_btn').addEventListener('click', undo);
    document.getElementById('overlay_btn').addEventListener('click', () => {
      if (overlayMode === 'win') {
        // "Keep going" — dismiss overlay, don't trigger again until next game.
        overlayMode = null;
        render();
      } else {
        newGame();
      }
    });

    // Re-position tiles on resize (their pixel coords depend on board width).
    let resizeRaf = 0;
    window.addEventListener('resize', () => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => { resizeRaf = 0; render(); });
    });

    // ---------- Boot ----------
    loadBest();
    if (!loadState() || !grid) {
      grid = emptyGrid();
      addRandomTile();
      addRandomTile();
    }
    applyLang();
    // Defer first render until layout is ready (we need .g2048-tiles width to
    // compute cell pixel size accurately).
    requestAnimationFrame(() => render(true));
    boardEl.focus({ preventScroll: true });
  })();
  </script>
</body>
</html>
